<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat + RAG - 曾厚桦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0b1120;color:#e2e8f0;height:100vh;display:flex}
/* 侧边栏 */
.side{width:260px;background:#111827;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid #1e2d45}
.side h2{padding:18px 16px;font-size:16px;background:linear-gradient(90deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.side .btn-new{margin:10px 14px;padding:9px;background:#6366f1;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px}
.side .btn-new:hover{background:#818cf8}
.hist{overflow-y:auto;padding:6px;max-height:30vh}
.hist .item{padding:9px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#8b9fc0;margin-bottom:1px;display:flex;align-items:center;gap:4px}
.hist .item:hover{background:rgba(255,255,255,.04);color:#cbd5e1}
.hist .item.on{background:rgba(99,102,241,.15);color:#818cf8}
.hist .item .conv-del{display:none;font-size:14px;color:#ef4444;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}
.hist .item:hover .conv-del{display:block}
.hist .item .conv-del:hover{color:#f87171}
/* KB区 */
.kb-sec{flex:1;overflow-y:auto;padding:6px;border-top:1px solid #1e2d45}
.kb-hd{font-size:10px;color:#526380;padding:8px 6px;display:flex;justify-content:space-between;text-transform:uppercase;letter-spacing:1px}
.kb-hd button{width:20px;height:20px;background:#6366f1;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;line-height:1}
.kb-item{padding:7px 8px;border-radius:6px;cursor:pointer;font-size:11px;color:#8b9fc0;display:flex;align-items:center;gap:6px;margin-bottom:1px}
.kb-item:hover{background:rgba(255,255,255,.04)}
.kb-item.on{background:rgba(34,197,94,.1);color:#22c55e}
.kb-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-item .x{display:none;color:#ef4444;cursor:pointer;font-weight:700}
.kb-item:hover .x{display:block}
.side-ft{padding:12px;border-top:1px solid #1e2d45;font-size:11px;color:#526380;text-align:center;margin-top:auto}
/* 主区 */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:10px 18px;background:#111827;border-bottom:1px solid #1e2d45;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar .badge{font-size:11px;padding:4px 10px;border-radius:10px;background:rgba(99,102,241,.15);color:#818cf8}
.topbar .badge.rag{background:rgba(34,197,94,.12);color:#22c55e}
.topbar .spc{flex:1}
.topbar button{font-size:11px;padding:5px 12px;background:transparent;color:#8b9fc0;border:1px solid #1e2d45;border-radius:6px;cursor:pointer}
.topbar button:hover{border-color:#6366f1;color:#cbd5e1}
.topbar button.green{border-color:#22c55e;color:#22c55e}
/* 聊天 */
.chat{flex:1;overflow-y:auto;padding:18px 22px}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:8px;opacity:.7}
.welcome h2{font-size:22px;background:linear-gradient(90deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:#8b9fc0;font-size:13px;line-height:1.6;max-width:400px}
.quick-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;justify-content:center;max-width:480px}
.quick-item{padding:7px 12px;background:#1a2332;border:1px solid #1e2d45;border-radius:16px;color:#8b9fc0;cursor:pointer;font-size:12px}
.quick-item:hover{border-color:#6366f1;color:#cbd5e1}
/* 消息 */
.msg{display:flex;gap:10px;margin-bottom:20px;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700}
.msg.user .av{background:#6366f1;color:#fff}
.msg.ai .av{background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff}
.msg .bd{flex:1;min-width:0}
.msg .hd{font-size:11px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.msg.user .hd{color:#818cf8}
.msg.ai .hd{color:#a78bfa}
.msg .hd .tm{font-size:10px;color:#526380;font-weight:400}
.msg .txt{line-height:1.7;font-size:14px;word-break:break-word;color:#cbd5e1}
.msg .txt pre{background:#0b1120;padding:12px 14px;border-radius:7px;overflow-x:auto;margin:8px 0;border:1px solid #1e2d45;font-size:12px;line-height:1.5}
.msg .txt code{font-family:'JetBrains Mono','Consolas',monospace;font-size:12px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px}
.msg .txt pre code{background:none;padding:0}
.msg .txt table{border-collapse:collapse;margin:8px 0;font-size:13px}
.msg .txt td,.msg .txt th{border:1px solid #1e2d45;padding:5px 10px;text-align:left}
.msg .txt th{background:rgba(99,102,241,.1)}
.msg .txt blockquote{border-left:3px solid #6366f1;padding:3px 12px;margin:6px 0;color:#8b9fc0}
.msg .txt ul,.msg .txt ol{padding-left:18px;margin:5px 0}
.cursor::after{content:'|';animation:blink .7s infinite;color:#818cf8}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
/* 输入 */
.inp-box{padding:12px 18px 16px;border-top:1px solid #1e2d45;background:#111827;flex-shrink:0}
.rag-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;min-height:20px}
.tgl{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.tgl input{display:none}
.tgl .track{width:36px;height:19px;border-radius:10px;background:#1e2d45;position:relative;transition:.2s}
.tgl .track::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:.2s}
.tgl input:checked+.track{background:#22c55e}
.tgl input:checked+.track::after{transform:translateX(17px)}
.tgl span{font-size:11px;color:#8b9fc0}
.kb-chips{display:flex;gap:5px;flex-wrap:wrap}
.kb-chip{padding:2px 9px;border-radius:9px;font-size:10px;cursor:pointer;border:1px solid #1e2d45;color:#8b9fc0}
.kb-chip.on{background:rgba(34,197,94,.12);border-color:#22c55e;color:#22c55e}
.inp-row{display:flex;gap:8px;background:#0b1120;border:1px solid #1e2d45;border-radius:11px;padding:5px 5px 5px 14px;align-items:flex-end}
.inp-row:focus-within{border-color:#6366f1}
.inp-row textarea{flex:1;background:none;border:none;outline:none;color:#cbd5e1;font-size:14px;line-height:1.5;resize:none;max-height:130px;font-family:inherit;padding:4px 0}
.inp-row textarea::placeholder{color:#526380}
.inp-row .sbtn{width:36px;height:36px;border-radius:8px;background:#6366f1;border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.inp-row .sbtn:hover{background:#818cf8}
.inp-row .sbtn.stop{background:#ef4444}
.hint{font-size:10px;color:#526380;text-align:center;margin-top:7px}
/* 弹窗 */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:9999;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal .bx{background:#1a2332;border:1px solid #1e2d45;border-radius:12px;padding:22px;width:92%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal .bx h3{font-size:16px;margin-bottom:4px}
.modal .bx .desc{font-size:12px;color:#8b9fc0;margin-bottom:10px;line-height:1.5}
.modal .bx input,.modal .bx textarea{width:100%;padding:9px 11px;background:#0b1120;border:1px solid #1e2d45;border-radius:7px;color:#cbd5e1;font-size:13px;margin-bottom:6px;outline:none;font-family:inherit}
.modal .bx input:focus,.modal .bx textarea:focus{border-color:#6366f1}
.modal .bx .btns{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
.modal .bx .btns button{padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:none;font-weight:600}
.btn-p{background:#6366f1;color:#fff}.btn-p:hover{background:#818cf8}
.btn-g{background:transparent;color:#8b9fc0;border:1px solid #1e2d45!important}
.btn-d{background:transparent;color:#ef4444;border:1px solid #ef4444!important}
.btn-s{background:#22c55e;color:#fff}
/* 文档 */
.d-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;border:1px solid #1e2d45;margin-bottom:3px;font-size:12px}
.d-row .di{flex:1;min-width:0}
.d-row .di .dn{color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-row .di .dm{color:#526380;font-size:10px}
.d-row button{padding:2px 7px;border-radius:4px;cursor:pointer;font-size:10px;border:1px solid #6366f1;color:#6366f1;background:transparent;margin-left:4px}
.d-row button.del{border-color:#ef4444;color:#ef4444}
.up-zone{border:2px dashed #1e2d45;border-radius:9px;padding:16px;text-align:center;cursor:pointer;margin-bottom:8px}
.up-zone:hover{border-color:#6366f1}
.up-zone .u-ico{font-size:20px;margin-bottom:2px}
.up-zone .u-txt{font-size:12px;color:#8b9fc0}
.up-zone .u-tip{font-size:10px;color:#526380;margin-top:2px}
.content-box{background:#0b1120;border:1px solid #1e2d45;border-radius:7px;padding:10px;max-height:160px;overflow-y:auto;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#8b9fc0;margin-bottom:10px}
.chunk-item{background:#0b1120;border:1px solid #1e2d45;border-radius:6px;padding:7px 9px;margin-bottom:3px;font-size:11px;line-height:1.5}
.chunk-item .ci{color:#6366f1;font-size:10px;margin-bottom:2px;font-weight:600}
.chunk-item .ct{color:#8b9fc0;white-space:pre-wrap}
</style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="side">
  <h2>AI Chat + RAG</h2>
  <button class="btn-new" onclick="newChat()">+ 新对话</button>
  <div class="hist" id="histList"></div>
  <div class="kb-sec">
    <div class="kb-hd"><span>知识库</span><button onclick="showKBMgr()">+</button></div>
    <div id="kbList"><div style="font-size:10px;color:#526380;text-align:center;padding:10px">暂无知识库</div></div>
  </div>
  <div class="side-ft">曾 厚 桦</div>
</aside>

<!-- 主区 -->
<div class="main">
  <div class="topbar">
    <span class="badge" id="badge">deepseek-chat</span>
    <span class="spc"></span>
    <button id="keyBtn" onclick="showApiModal()">设置 API Key</button>
    <button style="color:#ef4444;border-color:#ef4444" onclick="clearChat()">清空</button>
  </div>

  <div class="chat" id="chatBox">
    <div class="welcome" id="welcome">
      <div style="font-size:42px">⚡</div>
      <h2>DeepSeek AI Chat</h2>
      <p>流式对话 · RAG 知识库检索 · Markdown 渲染</p>
      <div class="quick-bar">
        <span class="quick-item" onclick="quickSend(this)">Python有哪些Web框架？</span>
        <span class="quick-item" onclick="quickSend(this)">快速排序的复杂度？</span>
        <span class="quick-item" onclick="quickSend(this)">什么是Transformer？</span>
        <span class="quick-item" onclick="quickSend(this)">MySQL和MongoDB区别？</span>
      </div>
    </div>
  </div>

  <div class="inp-box">
    <div class="rag-row">
      <label class="tgl">
        <input type="checkbox" id="ragToggle" onchange="onRagToggle()">
        <div class="track"></div>
        <span>RAG 知识库检索</span>
      </label>
      <div class="kb-chips" id="kbTags"></div>
    </div>
    <div class="inp-row">
      <textarea id="userInput" placeholder="输入问题，Enter 发送，Shift+Enter 换行" rows="1"
        onkeydown="return onKeyDown(event)" oninput="autoGrow(this)"></textarea>
      <button class="sbtn" id="sendBtn" onclick="onSendClick()">▶</button>
    </div>
    <div class="hint" id="hint">Enter 发送 · Shift+Enter 换行</div>
  </div>
</div>

<!-- API Key 弹窗 -->
<div class="modal" id="apiModal"><div class="bx">
  <h3>DeepSeek API Key</h3>
  <div class="desc">在 platform.deepseek.com 获取，仅存浏览器本地。</div>
  <input type="password" id="apiKeyInput" placeholder="sk-..." onfocus="this.type='text'" onblur="this.type='password'">
  <div class="btns">
    <button class="btn-d" onclick="delKey()">删除</button>
    <button class="btn-g" onclick="closeModal('apiModal')">取消</button>
    <button class="btn-p" onclick="saveKey()">保存</button>
  </div>
</div></div>

<!-- KB弹窗 -->
<div class="modal" id="kbModal"><div class="bx" id="kbBox"></div></div>

<script>
// ============================================================
// 全局状态
// ============================================================
var API     = 'https://api.deepseek.com/chat/completions';
var BACKEND = 'http://localhost:5000';
var MODEL   = 'deepseek-chat';

var msgs     = [];        // 当前对话消息
var convos   = [];        // [{title, msgs}]
var curConv  = 0;         // 当前对话索引
var ac       = null;      // AbortController（非 null = 正在生成）
var ragOn    = false;     // RAG开关
var selKBs   = [];        // 选中的知识库ID
var kbCache  = [];        // 知识库列表缓存

// ============================================================
// 工具
// ============================================================
function esc(s) {
  var d = document.createElement('div');
  d.textContent = (s == null) ? '' : String(s);
  return d.innerHTML;
}
function timeStr() {
  var d = new Date();
  return ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
}
function $(id) { return document.getElementById(id); }
function showM(id) { $(id).classList.add('show'); }
function hideM(id) { $(id).classList.remove('show'); }

// Markdown
function md(s) {
  if (!s) return '';
  s = esc(s);
  // 代码块
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_,lang,code){
    return '<pre><code>' + code.replace(/\n$/,'') + '</code></pre>';
  });
  // 行内代码
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 表格
  s = s.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, function(_,head,body){
    var h = '<tr>'+head.split('|').filter(function(x){return x.trim()}).map(function(x){return'<th>'+x.trim()+'</th>'}).join('')+'</tr>';
    var b = body.trim().split('\n').map(function(rw){
      return'<tr>'+rw.split('|').filter(function(x){return x.trim()}).map(function(x){return'<td>'+x.trim()+'</td>'}).join('')+'</tr>';
    }).join('');
    return'<table>'+h+b+'</table>';
  });
  // 标题
  s = s.replace(/^### (.+)$/gm,'<h4 style="margin:8px 0 3px">$1</h4>');
  s = s.replace(/^## (.+)$/gm,'<h3 style="margin:10px 0 5px">$1</h3>');
  s = s.replace(/^# (.+)$/gm,'<h2 style="margin:12px 0 6px">$1</h2>');
  // 粗体斜体
  s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // 引用
  s = s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // 水平线
  s = s.replace(/^---$/gm,'<hr>');
  // 列表
  s = s.replace(/^- (.+)$/gm,'<li>$1</li>');
  s = s.replace(/^(\d+)\. (.+)$/gm,'<li>$1. $2</li>');
  // 段落
  s = s.replace(/\n\n/g,'</p><p>');
  s = s.replace(/\n/g,'<br>');
  return '<p>'+s+'</p>';
}

// ============================================================
// 持久化（localStorage 缓存 + 后端同步）
// ============================================================
function loadState() {
  try {
    var d = JSON.parse(localStorage.getItem('chat_v3'));
    if (d) { convos = d.convos||[]; curConv = d.curConv||0; }
  } catch(e) {}
  if (!convos.length) { convos = [{title:'新对话', msgs:[], _id:null}]; curConv = 0; }
  if (!convos[curConv]) { curConv = 0; }
  // ★ 始终从 convos[curConv].msgs 取当前消息，不依赖全局 msgs
  msgs = convos[curConv] ? (convos[curConv].msgs||[]) : [];
}
function saveState() {
  try {
    convos[curConv].msgs = msgs;
    // 更新标题（取第一条用户消息前20字）
    var firstUser = null;
    for (var i = 0; i < msgs.length; i++) {
      if (msgs[i].role === 'user') { firstUser = msgs[i]; break; }
    }
    if (firstUser) {
      var t = firstUser.content.slice(0, 20);
      convos[curConv].title = t + (firstUser.content.length > 20 ? '...' : '');
    }
    localStorage.setItem('chat_v3', JSON.stringify({convos:convos, curConv:curConv}));
  } catch(e) {}
}
loadState();

// ====== 后端对话同步 ======
var _initPhase = true;  // 页面初始化阶段，防止后端数据覆盖用户操作

function apiBackend(path, opts) {
  opts = opts || {};
  return fetch(BACKEND + path, {
    method: opts.method || 'GET',
    headers: Object.assign({'Content-Type': 'application/json'}, opts.headers||{}),
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

// 从后端拉取对话列表，合并到 localStorage（仅在初始化阶段执行）
function fetchConversations() {
  return apiBackend('/api/conversations').then(function(list) {
    if (!_initPhase) return;  // ★ 用户已开始交互，不覆盖
    // 将后端数据合并到 convos（按 _id 匹配）
    var merged = [];
    var seen = {};
    for (var i = 0; i < list.length; i++) {
      var c = list[i];
      merged.push({
        _id: c.id,
        title: c.title,
        msgs: (c.messages || []).map(function(m) {
          return { role: m.role, content: m.content, _time: (m.created_at||'').slice(11,16) };
        }),
      });
      seen[c.id] = true;
    }
    // 保留 localStorage 中尚未同步到后端的对话
    for (var j = 0; j < convos.length; j++) {
      var lc = convos[j];
      if (!lc._id || !seen[lc._id]) {
        if (lc.msgs && lc.msgs.length) merged.push(lc);
      }
    }
    if (!merged.length) merged.push({title:'新对话', msgs:[], _id:null});
    convos = merged;
    if (curConv >= convos.length) curConv = 0;
    msgs = convos[curConv] ? (convos[curConv].msgs||[]) : [];
    saveState();
    _initPhase = false;
  }).catch(function() {
    _initPhase = false;
  });
}

// 同步单个对话到后端（全量替换消息）
function syncConversation(idx) {
  var c = convos[idx];
  if (!c) return;
  var cleanMsgs = (c.msgs||[]).map(function(m) {
    return { role: m.role, content: m.content };
  });

  var promise;
  if (c._id) {
    // 已有后端 ID → 更新
    promise = apiBackend('/api/conversations/' + c._id + '/messages', {
      method: 'POST',
      body: { messages: cleanMsgs },
    });
  } else {
    // 新对话 → 先创建再同步
    promise = apiBackend('/api/conversations', {
      method: 'POST',
      body: { title: c.title || '新对话' },
    }).then(function(conv) {
      c._id = conv.id;
      saveState();
      return apiBackend('/api/conversations/' + conv.id + '/messages', {
        method: 'POST',
        body: { messages: cleanMsgs },
      });
    });
  }
  return promise.catch(function() { /* 静默失败，localStorage 已保存 */ });
}

// 重命名对话
function renameConversation(idx, newTitle) {
  var c = convos[idx];
  if (!c) return;
  c.title = newTitle;
  saveState();
  if (c._id) {
    apiBackend('/api/conversations/' + c._id, {
      method: 'PUT',
      body: { title: newTitle },
    }).catch(function() {});
  }
  renderHist();
}

// 删除对话
function deleteConversation(idx) {
  if (convos.length <= 1) {
    // 至少保留一个对话
    convos = [{title:'新对话', msgs:[], _id:null}];
    curConv = 0;
    msgs = [];
    saveState();
    renderAll();
    $('userInput').focus();
    return;
  }
  var c = convos[idx];
  if (c && c._id) {
    apiBackend('/api/conversations/' + c._id, { method: 'DELETE' }).catch(function() {});
  }
  convos.splice(idx, 1);
  if (curConv >= convos.length) curConv = convos.length - 1;
  if (curConv < 0) curConv = 0;
  msgs = convos[curConv] ? (convos[curConv].msgs||[]) : [];
  saveState();
  renderAll();
  $('userInput').focus();
}

function renderChat() {
  var box = $('chatBox');
  if (!box) return;

  if (!msgs.length) {
    // ★ 不依赖可能已被移除的 DOM 节点，直接写 innerHTML
    box.innerHTML = '<div class="welcome" id="welcome">'
      + '<div style="font-size:42px">⚡</div>'
      + '<h2>DeepSeek AI Chat</h2>'
      + '<p>流式对话 · RAG 知识库检索 · Markdown 渲染</p>'
      + '<div class="quick-bar">'
      + '<span class="quick-item" onclick="quickSend(this)">Python有哪些Web框架？</span>'
      + '<span class="quick-item" onclick="quickSend(this)">快速排序的复杂度？</span>'
      + '<span class="quick-item" onclick="quickSend(this)">什么是Transformer？</span>'
      + '<span class="quick-item" onclick="quickSend(this)">MySQL和MongoDB区别？</span>'
      + '</div></div>';
    return;
  }

  var h = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    var isUser = (m.role === 'user');
    var cls = m._streaming ? ' txt cursor' : ' txt';
    var tag  = m._rag ? ' [RAG]' : '';
    var cont = isUser ? esc(m.content) : md(m.content);
    var tm   = m._time || '';
    h += '<div class="msg '+(isUser?'user':'ai')+'">'
      + '<div class="av">'+(isUser?'我':'AI')+'</div>'
      + '<div class="bd">'
      + '<div class="hd">'+(isUser?'You':'DeepSeek'+tag)
      + '<span class="tm">'+tm+'</span></div>'
      + '<div class="'+cls+'">'+cont+'</div>'
      + '</div></div>';
  }
  box.innerHTML = h;
  box.scrollTop = box.scrollHeight;
}

function updateBubble(content, streaming) {
  var last = document.querySelector('.msg:last-child .txt');
  if (last) {
    last.innerHTML = md(content);
    if (streaming) last.classList.add('cursor');
    else last.classList.remove('cursor');
  }
  var box = $('chatBox');
  if (box) {
    var d = box.scrollHeight - box.scrollTop - box.clientHeight;
    if (d < 120) box.scrollTop = box.scrollHeight;
  }
}

function renderHist() {
  var el = $('histList');
  if (!el) return;
  var h = '';
  for (var i = 0; i < convos.length; i++) {
    h += '<div class="item'+(i===curConv?' on':'')+'" onclick="switchChat('+i+')" oncontextmenu="event.preventDefault();showConvMenu(event,'+i+')">'

function renderAll() {
  try { renderChat(); } catch(e) {}
  try { renderHist(); } catch(e) {}
  try { updateKeyBtn(); } catch(e) {}

// ============================================================
function switchChat(i) {
  convos[curConv].msgs = msgs;
  curConv = i;
  var c = convos[i];
  if (!c) {
    msgs = [];
    saveState();
    renderAll();
    $('userInput').focus();
    return;
  }
  // 如果后端有数据且 localStorage 没有消息，尝试从后端加载
  if (c._id && (!c.msgs || !c.msgs.length)) {
    apiBackend('/api/conversations/' + c._id).then(function(conv) {
      if (conv && conv.messages) {
        c.msgs = (conv.messages||[]).map(function(m) {
          return { role: m.role, content: m.content, _time: (m.created_at||'').slice(11,16) };
        });
        c.title = conv.title || c.title;
        if (curConv === i) {
          msgs = c.msgs || [];
          saveState();
          renderAll();
        }
      }
    }).catch(function() {
      msgs = c.msgs || [];
      saveState();
      renderAll();
    });
  }
  msgs = c.msgs || [];
  saveState();
  renderAll();
  $('userInput').focus();
}
function newChat() {
  convos[curConv].msgs = msgs;
  convos.unshift({title:'新对话', msgs:[], _id:null});
  curConv = 0;
  msgs = [];
  saveState();
  renderAll();
  $('userInput').focus();
}
function clearChat() {
  if (confirm('清空当前对话？')) { msgs = []; saveState(); renderAll(); }
}
function showConvMenu(e, i) {
  var act = prompt('操作: 输入新名称重命名, 输入 del 删除, 取消则不操作\n当前名称: ' + (convos[i].title||'新对话'));
  if (!act) return;
  if (act.toLowerCase() === 'del' || act === '删除') {
    if (confirm('确定删除「'+(convos[i].title||'新对话')+'」？')) deleteConversation(i);
  } else {
    renameConversation(i, act.trim());
  }
}

// ============================================================
// 核心：发送消息
// ============================================================
function isBusy() {
  return ac !== null;
}

function setBusy(b) {
  var btn = $('sendBtn');
  if (b) {
    if (btn) {
      btn.textContent = '■';
      btn.classList.add('stop');
    }
  } else {
    ac = null;                    // ← 先清 ac，确保后续 doSend 不被阻塞
    if (btn) {
      btn.textContent = '▶';
      btn.classList.remove('stop');
    }
  }
}

function onSendClick() {
  if (ac) {
    // 正在生成 → 停止
    ac.abort();
    return;
  }
  doSend();
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (ac) { ac.abort(); return; }
    doSend();
    return false;
  }
  return true;
}

function doSend() {
  if (ac) return; // 正忙则忽略

  _initPhase = false;  // ★ 用户已交互，取消后端数据覆盖

  var inp = $('userInput');
  if (!inp) return;
  var text = (inp.value||'').trim();
  if (!text) return;

  var key = getKey();
  if (!key) { alert('请先设置 API Key！'); showApiModal(); return; }

  if (ragOn && !selKBs.length) {
    alert('请选择知识库或关闭 RAG');
    return;
  }

  // ★ 在处理前先清空输入框，确保即使后续出错也不残留旧内容
  inp.value = '';
  inp.style.height = 'auto';

  if (ragOn) {
    sendRAG(text, key);
  } else {
    sendNormal(text, key);
  }
}

// ====== 普通发送 ======
function sendNormal(text, key) {
  // 添加用户消息 + AI占位
  msgs.push({ role:'user', content:text, _time:timeStr() });
  var aiIdx = msgs.length - 1;
  msgs.push({ role:'assistant', content:'', _streaming:true, _time:timeStr() });
  aiIdx = msgs.length - 1;

  ac = new AbortController();
  setBusy(true);
  renderChat();
  updateBubble('', true);

  var fullContent = '';

  // 构建消息体
  var apiMsgs = [];
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    if (m.role === 'user' || !m._streaming) {
      apiMsgs.push({ role: m.role, content: m.content });
    }
  }

  // 发起请求
  fetch(API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key,
    },
    body: JSON.stringify({
      model: MODEL,
      messages: apiMsgs,
      stream: true,
      max_tokens: 4096,
      temperature: 0.7,
    }),
    signal: ac.signal,
  }).then(function(resp) {
    if (!resp.ok) {
      return resp.json().then(function(e) {
        throw new Error((e.error && e.error.message) || ('HTTP ' + resp.status));
      }, function() {
        throw new Error('HTTP ' + resp.status);
      });
    }
    return readSSE(resp, aiIdx);
  }).then(function(full) {
    fullContent = full;
    doneNormal(aiIdx, fullContent);
  }).catch(function(err) {
    if (err.name === 'AbortError') {
      if (!fullContent) fullContent = '_(已停止)_';
    } else {
      fullContent = '**出错了**\n\n' + err.message;
    }
    doneNormal(aiIdx, fullContent);
  });
}

function doneNormal(aiIdx, content) {
  var m = msgs[aiIdx];
  if (m) {
    delete m._streaming;
    m.content = content || '_(空响应)_';
  }
  setBusy(false);
  saveState();
  syncConversation(curConv);   // 异步同步到后端
  renderChat();
  renderHist();                // 更新标题显示
  $('userInput').focus();
}

// ====== RAG发送 ======
function sendRAG(text, key) {
  msgs.push({ role:'user', content:text, _time:timeStr() });
  var aiIdx = msgs.length;
  msgs.push({ role:'assistant', content:'', _streaming:true, _rag:true, _time:timeStr() });
  aiIdx = msgs.length - 1;

  ac = new AbortController();
  setBusy(true);
  renderChat();
  updateBubble('', true);

  var fullContent = '';
  var relevance = null;

  var hist = [];
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    if (m.role === 'user' || (!m._streaming && m.role === 'assistant')) {
      hist.push({ role: m.role, content: m.content });
    }
  }

  fetch(BACKEND + '/api/chat/rag', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      question: text,
      kb_ids: selKBs,
      history: hist.slice(-20),
      api_key: key,
    }),
    signal: ac.signal,
  }).then(function(resp) {
    if (!resp.ok) {
      return resp.json().then(function(e) {
        throw new Error(e.error || ('HTTP ' + resp.status));
      }, function() {
        throw new Error('HTTP ' + resp.status);
      });
    }
    return readRAGSSE(resp, aiIdx);
  }).then(function(result) {
    fullContent = result.content;
    relevance = result.relevance;
    doneRAG(aiIdx, fullContent, relevance);
  }).catch(function(err) {
    if (err.name === 'AbortError') {
      if (!fullContent) fullContent = '_(已停止)_';
    } else {
      fullContent = '**RAG 出错了**\n\n' + err.message + '\n\n请确认 Flask 后端已启动';
    }
    doneRAG(aiIdx, fullContent, null);
  });
}

function doneRAG(aiIdx, content, relevance) {
  var m = msgs[aiIdx];
  if (m) {
    delete m._streaming;
    var final = content || '_(空响应)_';
    if (relevance) {
      final = buildRelCard(relevance) + '\n\n---\n\n' + final;
    }
    m.content = final;
  }
  setBusy(false);
  saveState();
  syncConversation(curConv);   // 异步同步到后端
  renderChat();
  renderHist();
  $('userInput').focus();
}

// ====== SSE流读取 ======
function readSSE(resp, aiIdx) {
  return new Promise(function(resolve, reject) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var full = '';

    function next() {
      reader.read().then(function(result) {
        if (result.done) { resolve(full); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.indexOf('data:') !== 0) continue;
          var data = line.slice(5).trim();
          if (data === '[DONE]') { resolve(full); return; }
          try {
            var p = JSON.parse(data);
            var delta = ((p.choices||[])[0]||{}).delta||{};
            if (delta.content) {
              full += delta.content;
              if (msgs[aiIdx]) { msgs[aiIdx].content = full; msgs[aiIdx]._streaming = true; }
              updateBubble(full, true);
            }
          } catch(e) {}
        }
        next();
      }).catch(reject);
    }
    next();
  });
}

function readRAGSSE(resp, aiIdx) {
  return new Promise(function(resolve, reject) {
    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var full = '';
    var rel = null;

    function next() {
      reader.read().then(function(result) {
        if (result.done) { resolve({ content: full, relevance: rel }); return; }
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line || line.indexOf('data:') !== 0) continue;
          var data = line.slice(5).trim();
          if (data === '[DONE]') { resolve({ content: full, relevance: rel }); return; }
          try {
            var p = JSON.parse(data);
            if (p.type === 'relevance') { rel = p; continue; }
            if (p.error) { reject(new Error(p.error)); return; }
            var delta = ((p.choices||[])[0]||{}).delta||{};
            if (delta.content) {
              full += delta.content;
              if (msgs[aiIdx]) { msgs[aiIdx].content = full; msgs[aiIdx]._streaming = true; }
              updateBubble(full, true);
            }
          } catch(e) {}
        }
        next();
      }).catch(reject);
    }
    next();
  });
}

// ====== 相关性卡片 ======
function buildRelCard(d) {
  var ov = d.overall_relevance || 0;
  var c = ov >= 70 ? '#22c55e' : (ov >= 40 ? '#f59e0b' : '#ef4444');
  var lv = ov >= 70 ? '高度相关' : (ov >= 40 ? '部分相关' : '相关性低');
  var h = '';
  if (d.top_matches) {
    for (var i = 0; i < d.top_matches.length; i++) {
      var m = d.top_matches[i];
      var bc = m.relevance >= 70 ? '#22c55e' : (m.relevance >= 40 ? '#f59e0b' : '#ef4444');
      h += '<div style="display:flex;align-items:center;gap:6px;margin:2px 0;font-size:10px">'
        + '<span style="min-width:45px;color:#8b9fc0">'+esc(m.kb_name||'?')+'</span>'
        + '<div style="flex:1;height:4px;background:#1e2d45;border-radius:2px;overflow:hidden">'
        + '<div style="width:'+m.relevance+'%;height:100%;background:'+bc+';border-radius:2px"></div></div>'
        + '<span style="min-width:30px;text-align:right;color:'+bc+';font-weight:600">'+m.relevance+'%</span></div>';
    }
  }
  return '**知识库相关性检测**\n\n整体相关性: **'+ov+'%** ('+lv+')\n匹配数: '+((d.top_matches||[]).length)+' 条\n\n'+h;
}
